services:
  db:
    image: postgres:16-alpine
    container_name: portflow_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: portflow
      POSTGRES_PASSWORD: portflow
      POSTGRES_DB: portflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portflow -d portflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: portflow_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://portflow:portflow@db:5432/portflow
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres_data:
